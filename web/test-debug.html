<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Test - PulseOps</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-result { margin: 10px 0; padding: 10px; border-radius: 4px; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .info { background-color: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
    </style>
</head>
<body>
    <h1>PulseOps Debug Test</h1>
    <div id="test-results"></div>

    <script src="/js/mock-data.js"></script>
    <script src="/js/shared/auth.js"></script>
    <script src="/js/shared/utils.js"></script>
    <script src="/js/tabs.js"></script>
    
    <script>
        const results = document.getElementById('test-results');
        
        function addResult(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `test-result ${type}`;
            div.textContent = message;
            results.appendChild(div);
        }
        
        // Test 1: Check if mock data is loaded
        try {
            if (window.MockAPI && window.SAMPLE_DEVICES) {
                addResult('✓ Mock data loaded successfully', 'success');
                addResult(`✓ Found ${window.SAMPLE_DEVICES.length} sample devices`, 'success');
            } else {
                addResult('✗ Mock data not loaded', 'error');
            }
        } catch (e) {
            addResult(`✗ Mock data error: ${e.message}`, 'error');
        }
        
        // Test 2: Check if shared modules are loaded
        try {
            if (window.AuthModule) {
                addResult('✓ AuthModule loaded', 'success');
            } else {
                addResult('✗ AuthModule not loaded', 'error');
            }
            
            if (window.Utils) {
                addResult('✓ Utils module loaded', 'success');
            } else {
                addResult('✗ Utils module not loaded', 'error');
            }
            
            if (window.TabsModule) {
                addResult('✓ TabsModule loaded', 'success');
            } else {
                addResult('✗ TabsModule not loaded', 'error');
            }
        } catch (e) {
            addResult(`✗ Shared modules error: ${e.message}`, 'error');
        }
        
        // Test 3: Test API call with mock data
        setTimeout(async () => {
            try {
                addResult('Testing API call...', 'info');
                const response = await fetch('/api/devices');
                const data = await response.json();
                
                if (Array.isArray(data) && data.length > 0) {
                    addResult(`✓ API call successful, got ${data.length} devices`, 'success');
                    addResult(`✓ First device: ${data[0].name} (${data[0].status})`, 'success');
                } else {
                    addResult('✗ API call returned empty or invalid data', 'error');
                }
            } catch (e) {
                addResult(`✗ API call failed: ${e.message}`, 'error');
            }
        }, 1000);
        
        // Test 4: Test ES6 module import
        setTimeout(async () => {
            try {
                addResult('Testing ES6 module import...', 'info');
                const module = await import('/js/dashboard/views/overview.js');
                if (module.default) {
                    addResult('✓ ES6 module import successful', 'success');
                } else {
                    addResult('✗ ES6 module import failed - no default export', 'error');
                }
            } catch (e) {
                addResult(`✗ ES6 module import failed: ${e.message}`, 'error');
            }
        }, 2000);
    </script>
</body>
</html>
